name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  # actions: read
  # id-token: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          FULL="${GITHUB_REF#refs/tags/v}"
          SEMVER="${FULL%%-*}"
          echo "VERSION=$FULL" >> $GITHUB_OUTPUT
          echo "MSI_VERSION=$SEMVER" >> $GITHUB_OUTPUT
          if [[ "$FULL" == *-* ]]; then
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Windows executable
        run: wails build -platform windows/amd64 -ldflags "-X main.Version=${{ steps.version.outputs.VERSION }}"

      - name: Prepare portable exe
        shell: pwsh
        run: |
          Copy-Item "build\bin\SCBridgeCompanion.exe" "SCBridgeCompanion-portable.exe"

      - name: Install WiX Toolset
        run: dotnet tool install --global wix --version "4.*"

      - name: Build MSI installer
        shell: pwsh
        run: |
          Copy-Item "build\bin\SCBridgeCompanion.exe" "installer\SCBridgeCompanion.exe"
          Copy-Item "build\windows\icon.ico" "installer\icon.ico"
          cd installer
          wix extension add WixToolset.UI.wixext/4.0.5
          wix build installer.wxs `
            -ext WixToolset.UI.wixext `
            -d ProductVersion=${{ steps.version.outputs.MSI_VERSION }} `
            -o "..\SCBridgeCompanion-setup.msi" `
            -arch x64

      # SignPath code signing — commented out until OSS application is approved
      # - name: Upload unsigned artifacts
      #   id: upload-unsigned
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: unsigned-binaries
      #     path: |
      #       SCBridgeCompanion-portable.exe
      #       SCBridgeCompanion-setup.msi
      #
      # - name: Sign artifacts with SignPath
      #   id: sign
      #   if: vars.SIGNPATH_ORGANIZATION_ID != ''
      #   uses: signpath/github-action-submit-signing-request@v2
      #   with:
      #     api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
      #     organization-id: '${{ vars.SIGNPATH_ORGANIZATION_ID }}'
      #     project-slug: 'sc-companion'
      #     signing-policy-slug: 'release-signing'
      #     github-artifact-id: '${{ steps.upload-unsigned.outputs.artifact-id }}'
      #     wait-for-completion: true
      #     output-artifact-directory: 'signed'
      #
      # - name: Prepare release artifacts
      #   shell: pwsh
      #   run: |
      #     if (Test-Path "signed") {
      #       Write-Host "Using signed artifacts"
      #       Copy-Item "signed\*" "release\" -Force
      #     } else {
      #       Write-Host "Using unsigned artifacts (signing not configured)"
      #       New-Item -ItemType Directory -Path "release" -Force | Out-Null
      #       Copy-Item "SCBridgeCompanion-portable.exe" "release\"
      #       Copy-Item "SCBridgeCompanion-setup.msi" "release\"
      #     }
      #     Copy-Item "LICENSE" "release\"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SCBridgeCompanion-portable.exe
            SCBridgeCompanion-setup.msi
            LICENSE
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.version.outputs.PRERELEASE == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
