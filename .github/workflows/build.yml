name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Windows executable
        run: wails build -platform windows/amd64 -ldflags "-X main.Version=${{ steps.version.outputs.VERSION }}"

      # Rename portable exe
      - name: Prepare portable exe
        shell: pwsh
        run: |
          Copy-Item "build\bin\SCBridgeCompanion.exe" "SCBridgeCompanion-${{ steps.version.outputs.VERSION }}-portable.exe"

      # MSI installer via WiX v4
      - name: Install WiX Toolset
        run: dotnet tool install --global wix

      - name: Build MSI installer
        shell: pwsh
        run: |
          Copy-Item "build\bin\SCBridgeCompanion.exe" "installer\SCBridgeCompanion.exe"
          cd installer
          wix build installer.wxs -o "..\SCBridgeCompanion-${{ steps.version.outputs.VERSION }}-setup.msi" -arch x64

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SCBridgeCompanion-${{ steps.version.outputs.VERSION }}-portable.exe
            SCBridgeCompanion-${{ steps.version.outputs.VERSION }}-setup.msi
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
