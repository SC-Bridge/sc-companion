name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Windows executable
        run: wails build -platform windows/amd64 -nsis -ldflags "-X main.Version=${{ steps.version.outputs.VERSION }}"

      - name: Create release zip
        shell: pwsh
        run: |
          Compress-Archive -Path "build\bin\SCBridgeCompanion.exe" -DestinationPath "SCBridgeCompanion-${{ steps.version.outputs.VERSION }}-windows-amd64.zip"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SCBridgeCompanion-${{ steps.version.outputs.VERSION }}-windows-amd64.zip
            build/bin/SCBridgeCompanion-amd64-installer.exe
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
